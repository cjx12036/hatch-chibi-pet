name: Validate Skill

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependency
        run: python -m pip install --disable-pip-version-check pillow

      - name: Validate skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("skill/hatch-chibi-pet/SKILL.md")
          text = path.read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              raise SystemExit("SKILL.md is missing YAML frontmatter")
          frontmatter = text.split("---", 2)[1]
          required = {
              "name:": "hatch-chibi-pet",
              "description:": None,
          }
          for key, expected in required.items():
              matches = [line for line in frontmatter.splitlines() if line.startswith(key)]
              if len(matches) != 1:
                  raise SystemExit(f"expected one {key} field")
              value = matches[0].split(":", 1)[1].strip()
              if not value:
                  raise SystemExit(f"{key} must not be empty")
              if expected is not None and value != expected:
                  raise SystemExit(f"{key} must be {expected!r}")
          print("Skill metadata is valid")
          PY

      - name: Compile bundled scripts
        run: python -m py_compile skill/hatch-chibi-pet/scripts/*.py

      - name: Smoke-test preparation CLI
        run: python skill/hatch-chibi-pet/scripts/prepare_pet_run.py --help >/dev/null
